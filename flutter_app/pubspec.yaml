name: flutter_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/boards/easy/
    - assets/boards/intermediate/
    - assets/boards/hard/
    - assets/boards/expert/
    - assets/boards/evil/
    - assets/boards/mythic/
    - assets/cosmetics/backgrounds/
    - assets/cosmetics/backgrounds/default/
    - assets/cosmetics/frames/
    - assets/cosmetics/frames/default/
    - assets/cosmetics/frames/gold/
    - assets/cosmetics/frames/crystal/
    - assets/cosmetics/frames/shadow/
