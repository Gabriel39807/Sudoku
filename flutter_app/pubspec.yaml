name: flutter_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  animations: ^2.2.0
  confetti: ^0.8.0
  connectivity_plus: ^7.1.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_ntp: ^0.0.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  lottie: ^3.3.3
  shared_preferences: ^2.5.5
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ui/difficulties/
    - assets/boards/easy/
    - assets/boards/intermediate/
    - assets/boards/hard/
    - assets/boards/expert/
    - assets/boards/evil/
    - assets/boards/mythic/
    - assets/cosmetics/backgrounds/
    - assets/cosmetics/backgrounds/default/
    - assets/cosmetics/frames/
    - assets/cosmetics/frames/default/
    - assets/cosmetics/frames/gold/
    - assets/cosmetics/frames/crystal/
    - assets/cosmetics/frames/crystal_reference_v2/
    - assets/cosmetics/frames/shadow/
    - assets/boards/campaign/stage_01/
    - assets/boards/campaign/stage_02/
    - assets/boards/campaign/stage_03/
